<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kumkum</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #ffe6f0; font-family: 'Dancing Script', cursive; text-align: center; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .page { display: none; width: 90%; max-width: 500px; }
        .active { display: block; }
        .btn { padding: 15px 30px; font-size: 20px; border-radius: 20px; border: none; cursor: pointer; margin: 10px; transition: 0.3s; }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #ced4da; color: white; position: absolute; }
        .container { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .slide { display: none; width: 100%; height: auto; object-fit: contain; border-radius: 15px; margin-top: 10px; }
        h1 { color: #d63384; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <h1>Special Surprise for Kumkum! 💖</h1>
        <div style="font-size: 5em; cursor: pointer;" onclick="startSurprise()">💌</div>
        <p>Click to open your gift</p>
    </div>

    <div id="page2" class="page container">
        <h1>Happy Birthday Kumkum! 🎂</h1>
        <div class="slideshow-container">
            <img src="https://i.postimg.cc/7J0F6zNg/52f225b7-7a27-44cc-8716-ca3e5b1857ac.jpg" class="slide" style="display:block;">
            <img src="https://i.postimg.cc/jnPp5fXY/IMG-1296.jpg" class="slide">
            <img src="https://i.postimg.cc/1VwktFHh/IMG-1297.jpg" class="slide">
            <img src="https://i.postimg.cc/D4L9ZGcN/IMG-1305.jpg" class="slide">
            <img src="https://i.postimg.cc/7J0F6zNt/IMG-1307.jpg" class="slide">
            <img src="https://i.postimg.cc/xNMwCmPs/IMG-1308.jpg" class="slide">
            <img src="https://i.postimg.cc/JHZfnXQN/IMG-1322.jpg" class="slide">
            <img src="https://i.postimg.cc/bSk7JnRH/IMG-2929.jpg" class="slide">
            <img src="https://i.postimg.cc/62kstcCn/IMG-2934.jpg" class="slide">
            <img src="https://i.postimg.cc/HcqGdzbZ/IMG-2937.jpg" class="slide">
        </div>
        <p>I love you so much Kumkum!</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startSurprise() {
            // Page switch
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            
            // Start Music
            document.getElementById('bgMusic').play();
            
            // Start Confetti (Patkhe)
            confetti({ particleCount: 300, spread: 150, origin: { y: 0.6 } });
            
            // Start Slideshow
            showSlides();
        }

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 3000); 
        }
    </script>
</body>
</html>
