<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Archana</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #ffe6f0; font-family: 'Dancing Script', cursive; text-align: center; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .page { display: none; width: 90%; max-width: 500px; }
        .active { display: block; }
        .btn { padding: 15px 30px; font-size: 20px; border-radius: 20px; border: none; cursor: pointer; margin: 10px; transition: 0.3s; }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #ced4da; color: white; position: absolute; }
        
        .container { background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 15px; margin-bottom: 15px; }
        .slide { display: none; width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin-top: 10px; }
        h1 { color: #d63384; }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <h1>Special Surprise for Archana!</h1>
        <div style="font-size: 5em; cursor: pointer;" onclick="nextPage()">💌</div>
        <p>Click to open</p>
    </div>

    <div id="page2" class="page">
        <h1>Do you want to see your surprise?</h1>
        <button id="yesBtn" onclick="nextPage()">YES</button>
        <button id="noBtn" onmouseover="moveNoButton()" ontouchstart="moveNoButton()">NO</button>
    </div>

    <div id="page3" class="page container">
        <video id="birthdayVideo" controls>
            <source src="http://googleusercontent.com/generated_video_content/6688491574538922194" type="video/mp4">
        </video>
        <h1>Happy Birthday Archana! 🎂</h1>
        <div class="slideshow-container">
            <img src="https://i.postimg.cc/7J0F6zNg/52f225b7-7a27-44cc-8716-ca3e5b1857ac.jpg" class="slide" style="display:block;">
            <img src="https://i.postimg.cc/jnPp5fXY/IMG-1296.jpg" class="slide">
            <img src="https://i.postimg.cc/1VwktFHh/IMG-1297.jpg" class="slide">
            <img src="https://i.postimg.cc/D4L9ZGcN/IMG-1305.jpg" class="slide">
            <img src="https://i.postimg.cc/7J0F6zNt/IMG-1307.jpg" class="slide">
            <img src="https://i.postimg.cc/xNMwCmPs/IMG-1308.jpg" class="slide">
            <img src="https://i.postimg.cc/JHZfnXQN/IMG-1322.jpg" class="slide">
            <img src="https://i.postimg.cc/bSk7JnRH/IMG-2929.jpg" class="slide">
            <img src="https://i.postimg.cc/62kstcCn/IMG-2934.jpg" class="slide">
            <img src="https://i.postimg.cc/HcqGdzbZ/IMG-2937.jpg" class="slide">
        </div>
        <p>Aapki har khushi mere liye maayene rakhti hai!</p>
    </div>

    <script>
        let currentPage = 1;
        let slideIndex = 0;

        function nextPage() {
            document.getElementById('page' + currentPage).classList.remove('active');
            currentPage++;
            document.getElementById('page' + currentPage).classList.add('active');
            
            if(currentPage === 3) {
                document.getElementById('birthdayVideo').play();
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                showSlides();
            }
        }

        function moveNoButton() {
            const btn = document.getElementById('noBtn');
            btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            btn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        }

        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].style.display = "block";
            setTimeout(showSlides, 3000); 
        }
    </script>
</body>
</html>
